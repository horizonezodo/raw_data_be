apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: mbamc-biportal-dev

resources:
  - deployment.yaml

configMapGenerator:
  - name: reverse-proxy-be-config-app
    files:
      - application.properties=config/application.properties

generatorOptions:
  disableNameSuffixHash: true


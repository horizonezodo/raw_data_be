spring.profiles.active=

#Application name
spring.application.name=reverse-proxy
info.app.name=reverse-proxy
info.app.version=1.0.0
#sever.config
server.port=80
server.servlet.contextPath=/

spring.datasource.url=jdbc:oracle:thin:@113.190.234.241:31521/ORCLPDB1
spring.datasource.username=QTDL_BUSINESS
spring.datasource.password=123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.hikari.minimumIdle=5
spring.datasource.hikari.maximumPoolSize=100
spring.datasource.hikari.idleTimeout=30000
spring.datasource.hikari.poolName=HikariCP
spring.datasource.hikari.maxLifetime=2000000
spring.datasource.hikari.connectionTimeout=30000
spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ---- Added to fully define runtime config on dev ----
spring.main.web-application-type=servlet

# Server relaxed chars
server.tomcat.relaxed-path-chars=[,],{,}
server.tomcat.relaxed-query-chars=[,],{,}

# Logging
logging.level.org.springframework.cloud.gateway=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.web.servlet=DEBUG
logging.level.vn.com.amc.qtdl.bi_proxy=DEBUG
spring.mvc.log-request-details=true

# Tomcat access log (ngay trong container)
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%h %l %u %t "%r" %s %b %D
server.tomcat.accesslog.directory=logs
server.tomcat.basedir=.

# Spring Cloud Gateway (WebMVC)
spring.cloud.gateway.server.webmvc.routes[0].id=powerbi_proxy
spring.cloud.gateway.server.webmvc.routes[0].uri=http://10.10.0.33
# spring.cloud.gateway.server.webmvc.routes[0].uri=http://113.190.234.241:2024
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=AddRequestHeader=Host,#{request.headers['host']}
spring.cloud.gateway.server.webmvc.routes[0].filters[1]=AddRequestHeader=X-Real-IP,#{request.remoteAddress.address.hostAddress}
spring.cloud.gateway.server.webmvc.routes[0].filters[2]=AddRequestHeader=X-Forwarded-For,#{request.remoteAddress.address.hostAddress}
spring.cloud.gateway.server.webmvc.routes[0].filters[3]=AddRequestHeader=X-Forwarded-Proto,http
spring.cloud.gateway.server.webmvc.routes[0].filters[4]=AddRequestHeader=Authorization,Basic cG93ZXJiaXB1Ymxpc2hlcjpQYmlQdWJsaXNoZXJAMDgwNDIz
spring.cloud.gateway.server.webmvc.routes[0].filters[5]=RemoveResponseHeader=X-Frame-Options
spring.cloud.gateway.server.webmvc.routes[0].filters[6]=RemoveResponseHeader=Content-Security-Policy

# App URLs
app.url-bi=https://powerbi-proxy.dev.ngvgroup.vn
# app.url-portal=http://localhost:63342/
app.url-portal=https://biportal.dev.ngvgroup.vn/

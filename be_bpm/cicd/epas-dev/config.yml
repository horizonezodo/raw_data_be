spring:
  application:
    name: BPM

  kafka:
    bootstrap-servers: 10.10.0.31:9092

  datasource:
    url: jdbc:oracle:thin:@113.190.234.241:31521/ORCLPDB1
    # NOTE: datasource "gốc" nên là schema COMMON/MASTER (để đọc tenant config + base objects).
    # Nếu bạn chưa tách master/common, tạm để TENANT_NGV_DEMO như hiện tại.
    username: TENANT_NGV_DEMO
    password: 123456
    driver-class-name: oracle.jdbc.OracleDriver

  jackson:
    time-zone: Asia/Ho_Chi_Minh

  jpa:
    hibernate:
      ddl-auto: none

  # ✅ Tắt Liquibase auto của Spring (multi-tenant runner tự chạy)
  liquibase:
    enabled: false

  thymeleaf:
    check-template: false
  freemarker:
    check-template-location: false

# ✅ SINGLE SOURCE OF TRUTH - KEYCLOAK
security:
  keycloak:
    base-url: http://10.10.0.31:31090
    realm: EPAS_DEV
    token-uri: http://10.10.0.31:31090/realms/EPAS_DEV/protocol/openid-connect/token
    auth-uri: http://10.10.0.31:31090/realms/EPAS_DEV/protocol/openid-connect/auth
    client-id: epas_service
    client-secret: R4lYzWDlyAwp5V2lwetT6RYvBfvkweLT
    redirect-uri: https://epas.dev.ngvgroup.vn/auth/callback

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true

logging:
  kafka:
    topic:
      activity: COM_INF_LOG_ACTIVITY_TOPIC
      audit: COM_INF_LOG_AUDIT_TOPIC

bpm:
  liquibase:
    tenant:
      # bật/tắt theo nhu cầu
      enabled: true
      migrate-on-startup: true
      change-log: classpath:/db/changelog/db.changelog-master.xml

      # nếu bạn đang dùng multi-schema synonym mapping thì giữ
      schema-targets:
        common_schema: COMMON
        hrm_schema: HRM

  core:
    cors:
      allowed-origins:
        - https://epas.dev.ngvgroup.vn
        - http://localhost:4200
        - http://localhost:4206

    logging-toggle:
      enabled: true
      remote-base-url: http://localhost:8301/api/setting/get-config-log
      cache-ttl-seconds: 30

    activity-log-enabled: true

# ✅ Camunda tách datasource riêng (schema riêng do user CAMUNDA_BPM)
camunda:
  datasource:
    jdbc-url: jdbc:oracle:thin:@113.190.234.241:31521/ORCLPDB1
    username: CAMUNDA_BPM
    password: 123456
    driver-class-name: oracle.jdbc.OracleDriver
    maximum-pool-size: 10
    minimum-idle: 2
    pool-name: camunda-pool

  bpm:
    webapp:
      authentication:
        enabled: false
    authorization:
      enabled: false
    database:
      # nếu để true thì Camunda tự tạo bảng vào schema của CAMUNDA_BPM (đúng mục tiêu tách schema)
      schema-update: true
      type: oracle
    admin-user:
      id: demo
      password: demo
      firstName: Demo
      lastName: User

kafka:
  topic:
    email: MAIL_PROCESS

multitenancy:
  enabled: true
  #  enabled: false
  #  tenant-claim: tenant_id
  #  tenant-header: X-Tenant-Id
  kafka:
    topic: EVENT-CREATED-TENANT
    group: ${spring.application.name}
  schema:
    password: 123456

  organizations:
    enabled: true
    claim: organization
    tenantAttribute: tenant_id
    preferTenantAttribute: true
    selectHeader: X-Org-Alias

client:
  epas-common: https://epas.dev.ngvgroup.vn/api-common

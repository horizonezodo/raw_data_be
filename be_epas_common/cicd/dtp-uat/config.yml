aes:
  key: ${AES_KEY:oZLnIHs8wk38jSC8XKhIpi2d} # 24 ky tu

spring:
  datasource:
    url: jdbc:oracle:thin:@113.190.234.241:31521/ORCLPDB1
    username: DTP_UAT_COMMON
    password: 123456
    driver-class-name: oracle.jdbc.OracleDriver
  #    url: jdbc:oracle:thin:@113.190.234.241:31521/ORCLPDB1
  #    username: EPAS_DEV_COMMON
  #    password: 123456
  #    driver-class-name: oracle.jdbc.OracleDriver
  application:
    name: COMMON
  kafka:
    bootstrap-servers: 10.10.0.31:32622
    producer:
      bootstrap-servers: 10.10.0.31:32622
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      bootstrap-servers: 10.10.0.31:32622
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: latest

  jackson:
    time-zone: Asia/Ho_Chi_Minh
  jpa:
    hibernate:
      ddl-auto: none
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://10.10.0.31:31095/realms/DTP_UAT
          jwk-set-uri: http://10.10.0.31:31095/realms/DTP_UAT/protocol/openid-connect/certs
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 1GB

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
bpm:
  core:
    activity-log-enabled: true
    cors:
      allowed-origins:
        - https://dtp.uat.ngvgroup.vn
    web:
      ignoring-paths:
        - /assets/**
        - /favicon.ico
      public-paths:
        - /remotes/url
        - /remotes/module
        - /setting/get-config-log
        - /setting/app-config
        - /auth/login
        - /auth/token
        - /auth/exchange-code
        - /auth/refresh-token
        - /auth/list-branch
        - /auth/update-branch
        - /auth/get-kc-login-url
        - /captcha/**
        - /public/**
        - /tenant/search-tenant
        - /tenant/exist
    oauth2:
      token-uri: http://10.10.0.31:31095/realms/DTP_UAT/protocol/openid-connect/token
      client-id: epas_service
      client-secret: YCrLXhGKy1HGTSQdeIcBiS3e4xAbfRlw
      cache-token: true
    stored-procedure:
      enabled: true

logging:
  kafka:
    topic:
      activity: COM_INF_LOG_ACTIVITY_TOPIC   # trùng với topic bên producer
      audit: COM_INF_LOG_AUDIT_TOPIC
    consumer-group: activity-log-consumer
  config: classpath:log4j.xml

stat:
  websocket:
    group-id: ${spring.application.name}-${random.uuid}
    session-topic: WS_USER_SESSION_EVENT

job:
  kafka:
    topic:
      id: JOB-ID        # Đảm bảo giá trị này là hợp lệ, không để placeholder.
      status: JOB-STATUS
    consumer-group:
      clear-activity: ADMIN_CLEAR_ACTIVITY_GROUP
      status: ADMIN_JOB_STATUS_GROUP
  scheduler:
    fixed-delay-ms: 10000

minio:

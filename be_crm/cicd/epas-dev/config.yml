logging:
  kafka:
    topic:
      activity: COM_INF_LOG_ACTIVITY_TOPIC
      audit: COM_INF_LOG_AUDIT_TOPIC

server:
  port: 8080
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
bpm:
  liquibase:
    tenant:
      change-log: classpath:db/changelog/db.changelog-master.xml
      schema-targets:
        common_schema: COMMON
  #      enabled: true
  #      migrate-on-startup: true
  #      change-log: classpath:db/db.changelog-master.xml
  core:
    # Bỏ OAuth2
    cors:
      allowed-origins:
        - https://epas.dev.ngvgroup.vn
        - http://localhost:4200
        - http://localhost:4205
    logging-toggle:
      enabled: true
      remote-base-url: https://epas.dev.ngvgroup.vn/api-common/api/setting/get-config-log
      cache-ttl-seconds: 30
    activity-log-enabled: true
  client:
    controller:
      enabled: true

service:
  bpm:
    url: https://epas.dev.ngvgroup.vn/api-bpm
  common:
    url: https://epas.dev.ngvgroup.vn/api-common
camunda:
  bpm:
    client:
      base-url: https://epas.dev.ngvgroup.vn/api-bpm/api/engine-rest

minio:
  url: http://10.10.0.31:32010
  access-key: admin
  secret-key: admin123
  bucket: epas

multitenancy:
  enabled: true
  #  enabled: false
  #  tenant-claim: tenant_id
  #  tenant-header: X-Tenant-Id
  kafka:
    topic: EVENT-CREATED-TENANT
    group: ${spring.application.name}
  schema:
    password: 123456

  organizations:
    enabled: true
    claim: organization # claim name trong token
    tenantAttribute: tenant_id # attribute bạn set ở A3
    preferTenantAttribute: true # ưu tiên attribute (tenant_id) hơn alias
    selectHeader: X-Org-Alias # dùng khi user thuộc nhiều org

        - https://ncf.uat.ngvgroup.vn
    oauth2:
      token-uri: http://10.10.0.31:31091/realms/NCF_UAT/protocol/openid-connect/token
      client-id: epas_service
      client-secret: 30EiPJ7G5O9DWc8YroWViOWETiPxB29f
      cache-token: true
    stored-procedure:
      enabled: true
      connection-pool:
        initial-size: 5
        max-size: 20
        min-idle: 5
        connection-timeout: 30000
        idle-timeout: 600000
        max-lifetime: 1800000
      timeout:
        connection: 30000
        query: 60000
      retry:
        enabled: true
        max-attempts: 3
        backoff-delay: 1000
server:

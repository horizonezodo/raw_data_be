#ldap config
management.health.ldap.enabled=false
management.health.rabbit.enabled=false
database.username=data

server.port=8087
server.forward-headers-strategy=native

# --- Spring Cloud Gateway ---
spring.cloud.gateway.forwarded.enabled=false

# Route: upstream_route
spring.cloud.gateway.routes[0].id=upstream_route
spring.cloud.gateway.routes[0].uri=http://10.10.0.32
spring.cloud.gateway.routes[0].predicates[0]=Path=/**

spring.cloud.gateway.routes[0].filters[0]=RemoveResponseHeader=X-Frame-Options
spring.cloud.gateway.routes[0].filters[1]=PreserveHostHeader
spring.cloud.gateway.routes[0].filters[2]=RemoveRequestHeader=X-Forwarded-Proto
spring.cloud.gateway.routes[0].filters[3]=RewritePath=/tableau/get-ticket, /trusted
spring.cloud.gateway.routes[0].filters[4]=RewriteResponseHeader=Location, http://tableau-proxy.dev.ngvgroup.vn, https://tableau-proxy.dev.ngvgroup.vn

spring.cloud.gateway.routes[0].filters[5].name=Retry
spring.cloud.gateway.routes[0].filters[5].args.retries=3
spring.cloud.gateway.routes[0].filters[5].args.statuses=INTERNAL_SERVER_ERROR,GATEWAY_TIMEOUT,SERVICE_UNAVAILABLE
spring.cloud.gateway.routes[0].filters[5].args.methods=GET,POST
spring.cloud.gateway.routes[0].filters[5].args.backoff.firstBackoff=500ms
spring.cloud.gateway.routes[0].filters[5].args.backoff.maxBackoff=5s
spring.cloud.gateway.routes[0].filters[5].args.backoff.factor=2

spring.cloud.gateway.httpclient.pool.max-connections=200
spring.cloud.gateway.httpclient.pool.max-idle-time=30s
spring.cloud.gateway.httpclient.pool.acquire-timeout=5000
spring.cloud.gateway.httpclient.connect-timeout=10000
spring.cloud.gateway.httpclient.response-timeout=30000



app.url-tableau=http://localhost:8087/
app.url-portal=http://localhost:3000/

#---Whitelist---

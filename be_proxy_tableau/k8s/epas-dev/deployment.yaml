apiVersion: apps/v1
kind: Deployment
metadata:
  name: tableau-proxy-be
  namespace: epas-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tableau-proxy-be
      environment: dev
  template:
    metadata:
      labels:
        app: tableau-proxy-be
        environment: dev
    spec:
      containers:
        - name: tableau-proxy-be
          image: localhost:32000/tableau-proxy:latest
          ports:
            - containerPort: 80
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: dev
      terminationGracePeriodSeconds: 60

---
apiVersion: v1
kind: Service
metadata:
  name: tableau-proxy-be-service
  namespace: epas-dev
spec:
  selector:
    app: tableau-proxy-be
    environment: dev
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tableau-proxy-be-ingress
  namespace: epas-dev
spec:
  ingressClassName: public
  rules:
    - host: tableau-proxy.dev.ngvgroup.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tableau-proxy-be-service
                port:
                  number: 80
